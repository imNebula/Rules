rule-providers:
  ai:
    type: http
    behavior: classical
    format: yaml
    url: 'https://raw.githubusercontent.com/imNebula/Rules/main/dist/mihomo/ai.yaml'
    path: ./ruleset/ai.yaml
    interval: 86400
  direct:
    type: http
    behavior: classical
    format: yaml
    url: 'https://raw.githubusercontent.com/imNebula/Rules/main/dist/mihomo/direct.yaml'
    path: ./ruleset/direct.yaml
    interval: 86400
  reject:
    type: http
    behavior: classical
    format: yaml
    url: 'https://raw.githubusercontent.com/imNebula/Rules/main/dist/mihomo/reject.yaml'
    path: ./ruleset/reject.yaml
    interval: 86400

rules:
  - RULE-SET,ai,AI
  - RULE-SET,direct,DIRECT
  - RULE-SET,reject,REJECT
  - MATCH,PROXY
