name: Build Rules

on:
  push:
    paths:
      - "domains.txt"
      - "scripts/build.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build rule files
        run: python scripts/build.py

      - name: Commit and push to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B temp-release-branch
          git add -f dist
          if git diff --cached --quiet; then
            echo "No dist changes to commit."
            exit 0
          fi
          git commit -m "chore: update generated rules"
          git push origin temp-release-branch:release --force

      - name: Upload Pages artifact
        if: ${{ vars.ENABLE_PAGES == 'true' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: ${{ vars.ENABLE_PAGES == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
