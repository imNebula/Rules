rule-providers:
  uzu:
    type: http
    behavior: domain
    format: yaml
    url: https://imNebula.github.io/Rules/mihomo/uzu.yaml
    path: ./ruleset/uzu.yaml
    interval: 86400
  fast:
    type: http
    behavior: domain
    format: yaml
    url: https://imNebula.github.io/Rules/mihomo/fast.yaml
    path: ./ruleset/fast.yaml
    interval: 86400

rules:
  - RULE-SET,uzu,UZU
  - RULE-SET,fast,FAST
  - MATCH,PROXY
