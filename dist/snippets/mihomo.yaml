rule-providers:
  ai:
    type: http
    behavior: domain
    format: yaml
    url: https://imNebula.github.io/Rules/mihomo/ai.yaml
    path: ./ruleset/ai.yaml
    interval: 86400
  direct:
    type: http
    behavior: domain
    format: yaml
    url: https://imNebula.github.io/Rules/mihomo/direct.yaml
    path: ./ruleset/direct.yaml
    interval: 86400
  reject:
    type: http
    behavior: domain
    format: yaml
    url: https://imNebula.github.io/Rules/mihomo/reject.yaml
    path: ./ruleset/reject.yaml
    interval: 86400

rules:
  - RULE-SET,ai,AI
  - RULE-SET,direct,DIRECT
  - RULE-SET,reject,REJECT
  - MATCH,PROXY
